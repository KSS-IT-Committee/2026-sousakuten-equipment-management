services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: equipment
      POSTGRES_PASSWORD: equipment
      POSTGRES_DB: equipment
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equipment -d equipment"]
      interval: 2s
      timeout: 2s
      retries: 30

  app:
    image: node:24
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://equipment:equipment@db:5432/equipment
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npx drizzle-kit migrate && npm run dev"

volumes:
  postgres_data:
