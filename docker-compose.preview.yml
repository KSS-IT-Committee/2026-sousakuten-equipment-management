services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: equipment
      POSTGRES_PASSWORD: equipment
      POSTGRES_DB: equipment
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equipment -d equipment"]
      interval: 2s
      timeout: 2s
      retries: 30

  # Apply the canonical appdata schema to the fresh, empty preview DB before the
  # app boots. The app image is now `output: standalone` and no longer ships
  # drizzle-kit, so we use 2026-db's migrator image — the same image that is the
  # sole migrator in production. Its entrypoint runs `drizzle-kit migrate`.
  migrate:
    image: ghcr.io/kss-it-committee/2026-db/migrator:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://equipment:equipment@db:5432/equipment
    restart: "no"

  app:
    image: ghcr.io/${IMAGE_SLUG:?IMAGE_SLUG must be set}/preview:${TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://equipment:equipment@db:5432/equipment
    ports:
      - "3000:3000"
